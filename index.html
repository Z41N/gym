<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8ff00;
      --text: #f0f0f0;
      --muted: #888;
      --red: #ff4444;
      --blue: #4a9eff;
      --green: #44cc88;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .day-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .day-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .day-title span {
      color: var(--accent);
    }
    .date-box {
      text-align: right;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .date-box .time {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    /* Progression banner */
    .progression {
      background: #1a1f0a;
      border: 1px solid #3a4a10;
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c8e855;
      margin-bottom: 20px;
    }
    .progression strong { color: var(--accent); }

    /* Section */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Exercise cards */
    .exercises { margin-bottom: 24px; }
    .exercise-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .ex-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      min-width: 18px;
    }
    .ex-body { flex: 1; }
    .ex-name {
      font-weight: 600;
      font-size: 15px;
    }
    .ex-cue {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .ex-meta {
      text-align: right;
      white-space: nowrap;
    }
    .ex-sets {
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
    }
    .ex-reps {
      font-size: 12px;
      color: var(--muted);
    }

    /* Activity cards (rest/recovery days) */
    .activity-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      margin-bottom: 8px;
    }
    .activity-task {
      font-weight: 600;
      font-size: 15px;
    }
    .activity-benefit {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Nutrition */
    .nutrition { margin-bottom: 24px; }
    .meal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .meal-body { flex: 1; }
    .meal-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .meal-desc {
      font-weight: 500;
      font-size: 14px;
    }
    .meal-note {
      font-size: 11px;
      color: #888;
      font-style: italic;
      margin-top: 2px;
    }
    .meal-protein {
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
      white-space: nowrap;
    }


/* Nutrition rules */
    .rules {
      margin-top: 10px;
    }
    .rule {
      display: flex;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 0;
      border-top: 1px solid var(--border);
    }
    .rule:first-child { border-top: none; }
    .rule::before { content: "—"; color: #444; flex-shrink: 0; }

    /* Supplements */
    .supplements { margin-bottom: 24px; }
    .supp-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      margin-bottom: 8px;
    }
    .supp-timing {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--blue);
      margin-bottom: 2px;
    }
    .supp-desc {
      font-size: 14px;
      font-weight: 500;
    }

    /* Rest day header */
    .rest-header {
      text-align: center;
      padding: 24px 0 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .rest-header .rest-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
    }
    .rest-header .rest-text {
      font-size: 15px;
      color: var(--text);
      font-weight: 500;
    }

    /* Water */
    .water-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 15px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .water-bar .label { color: var(--muted); }
    .water-bar .val { font-weight: 700; color: var(--blue); font-size: 16px; }

    /* Nav bar */
    .nav {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
    }
    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: border-color 0.15s, color 0.15s;
    }
    .nav-btn:hover { border-color: #444; color: var(--text); }
    .nav-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1f0a; }
    .nav-btn.back { border-color: #444; color: var(--text); }

    /* Week overview / timeline */
    .week-grid { display: flex; flex-direction: column; gap: 6px; }
    .week-section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #444;
      padding: 8px 2px 2px;
    }
    .week-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .week-card:hover { border-color: #444; }
    .week-card.today { border-color: var(--accent); background: #131a02; }
    .week-card.past { opacity: 0.65; }
    .week-card.past:hover { opacity: 1; }
    .week-card.pre-program { opacity: 0.3; cursor: default; }
    .week-date-col {
      min-width: 52px;
      text-align: center;
      padding-top: 1px;
    }
    .week-date-num {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }
    .week-card.today .week-date-num { color: var(--accent); }
    .week-date-month {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 1px;
    }
    .week-card-body { flex: 1; }
    .week-day-name {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .week-card.today .week-day-name { color: var(--accent); }
    .week-workout-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 3px;
    }
    .week-detail {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .week-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 10px;
      margin-top: 4px;
    }
    .week-tag.workout { background: #1a2a05; color: var(--accent); }
    .week-tag.recovery { background: #0a1a2a; color: var(--blue); }
    .week-tag.rest { background: #0a1a2a; color: var(--blue); }
    .week-tag.history { background: #1a1218; color: #c88; }

    /* History detail view */
    .history-card {
      background: var(--surface);
      border: 1px solid #3a2a2a;
      border-left: 3px solid #c88;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .history-date { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .history-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .history-summary { font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
    .history-note {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    @media (max-width: 400px) {
      .day-title { font-size: 20px; }
      body { padding: 12px; }
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>

    },

    }
  },
  "nutrition": {

      { "label": "Meal 3", "time": null, "description": "Factor Protein Plus OR 7oz Chicken + Greens", "protein_g": 48, "note": null },
      { "label": "Dinner", "time": null, "description": "Factor Keto Beef OR 90/10 Ground Beef + Broccoli", "protein_g": 38, "note": null }
    ],
    "rules": [
      "Add 500ml water per Factor meal to prevent puffiness",
      "Rest day: remove white rice and halve Factor carbs"
    ]
  },
  "supplements": [
    { "timing": "Pre-Workout", "desc": "1-2 scoops ON Amino Energy (20-30 mins prior)" },
    { "timing": "Post-Workout", "desc": "2 scoops Whey (25g/scoop) + 5g Creatine" },
    { "timing": "Evening", "desc": "Magnesium Glycinate — muscle recovery & sleep" }
  ]
};

const DAYS = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];

function formatTime(d) {
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
}

function cap(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function renderWorkout(day, dayData, showClock = true) {
  const isRest = dayData.type === 'rest';
  const isRecovery = dayData.type === 'recovery';
  const isWorkout = dayData.type === 'workout';

  const now = new Date();
  const totalProtein = DATA.nutrition.meals.reduce((s, m) => s + m.protein_g, 0);
  const workoutProtein = DATA.nutrition.meals.find(m => m.label === 'Post-Workout').protein_g;
  const restProtein = totalProtein - workoutProtein;

  let html = '';

  // Header
  html += `<div class="header">
    <div>
      <div class="day-label">${cap(day)}</div>
      <div class="day-title"><span>${dayData.title}</span>${dayData.subtitle ? '<br><small style="font-size:14px;color:#888;font-weight:400">' + dayData.subtitle + '</small>' : ''}</div>
    </div>
    ${showClock ? `<div class="date-box">
      <div class="time">${formatTime(now)}</div>
      <div>${formatDate(now)}</div>
    </div>` : ''}
  </div>`;

  // Progression banner (workout days only)
  if (isWorkout) {
    html += `<div class="progression">
      <strong>Progression:</strong> ${DATA.rule_of_progression}
    </div>`;
  }

  // Workout section
  if (isWorkout) {
    html += `<div class="exercises">
      <div class="section-title">Today's Lifts</div>`;
    dayData.exercises.forEach((ex, i) => {
      html += `<div class="exercise-card">
        <div class="ex-num">${i + 1}</div>
        <div class="ex-body">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-cue">${ex.cue}</div>
        </div>
        <div class="ex-meta">
          <div class="ex-sets">${ex.sets} x ${ex.reps}</div>
          <div class="ex-reps">sets x reps</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Recovery / Rest activities
  if (isRecovery || isRest) {
    if (isRest) {
      html += `<div class="rest-header">
        <span class="rest-icon">&#x1F4AA;</span>
        <div class="rest-text">Rest day. Recover hard.</div>
      </div>`;
    }
    html += `<div class="exercises">
      <div class="section-title">${isRest ? 'Priorities' : 'Activities'}</div>`;
    dayData.activities.forEach(act => {
      html += `<div class="activity-card">
        <div class="activity-task">${act.task}</div>
        <div class="activity-benefit">${act.benefit}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Nutrition
  const showPostWorkout = isWorkout;
  const effectiveProtein = showPostWorkout ? totalProtein : restProtein;

  html += `<div class="nutrition">
    <div class="section-title">Nutrition — 170g Protein Goal</div>`;

  DATA.nutrition.meals.forEach(meal => {
    const skip = !showPostWorkout && meal.label === 'Post-Workout';
    if (skip) return;
    html += `<div class="meal-card">
      <div class="meal-body">
        <div class="meal-label">${meal.label}${meal.time ? ' · ' + meal.time : ''}</div>
        <div class="meal-desc">${meal.description}</div>
        ${meal.note ? `<div class="meal-note">${meal.note}</div>` : ''}
      </div>
      <div class="meal-protein">${meal.protein_g}g</div>
    </div>`;
  });


  if (!showPostWorkout) {
    html += `<div class="rules"><div class="rule">Rest day: white rice removed, Factor carbs halved</div></div>`;
  }

  html += `<div class="rules">`;
  DATA.nutrition.rules.slice(0,1).forEach(r => {
    html += `<div class="rule">${r}</div>`;
  });
  html += `</div></div>`;

  // Water
  html += `<div class="water-bar">
    <span class="label">Daily water target</span>
    <span class="val">4 Liters</span>
  </div>`;

  // Supplements
  html += `<div class="supplements">
    <div class="section-title">Supplements</div>`;
  DATA.supplements.forEach(s => {
    const show = isWorkout || s.timing === 'Evening';
    if (!show) return;
    html += `<div class="supp-card">
      <div class="supp-timing">${s.timing}</div>
      <div class="supp-desc">${s.desc}</div>
    </div>`;
  });
  html += `</div>`;

  return html;
}

function dateKey(d) {
  return d.toISOString().slice(0, 10);
}

function renderWeek(todayDate) {
  const today = new Date(todayDate);
  today.setHours(0,0,0,0);

  // Build 15-day window: 7 past + today + 7 future
  const days = [];
  for (let i = -7; i <= 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    days.push(d);
  }

  const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  let html = `<div class="nav">
    <button class="nav-btn back" onclick="showToday()">&#8592; Today</button>
  </div><div class="week-grid">`;

  let lastSection = '';
  days.forEach(d => {
    const key = dateKey(d);
    const isToday = key === dateKey(today);
    const isPast = d < today;
    const isPreProgram = d < PROGRAM_START;
    const dayName = DAYS[d.getDay()];
    const sched = DATA.schedule[dayName];
    const hist = HISTORY[key];

    // Section dividers
    const section = isToday ? 'today' : isPast ? 'past' : 'upcoming';
    if (section !== lastSection) {
      if (section === 'today') html += `<div class="week-section-label">Today</div>`;
      else if (section === 'upcoming') html += `<div class="week-section-label">Upcoming</div>`;
      else if (lastSection === '') html += `<div class="week-section-label">Past</div>`;
      lastSection = section;
    }

    const dateNum = d.getDate();
    const dateMonth = MONTH_SHORT[d.getMonth()];
    const dayLabel = DAY_NAMES[d.getDay()];

    let cardClass = 'week-card';
    let onclick = '';
    let titleHtml = '';
    let detailHtml = '';
    let tagHtml = '';

    if (isPreProgram) {
      cardClass += ' pre-program';
      titleHtml = `<div class="week-workout-title" style="color:var(--muted)">—</div>`;
    } else if (isPast && hist) {
      cardClass += ' past';
      onclick = `onclick="showHistory('${key}')"`;
      titleHtml = `<div class="week-workout-title">${hist.session_type}</div>`;
      detailHtml = `<div class="week-detail">${hist.summary}</div>`;
      tagHtml = `<span class="week-tag history">completed</span>`;
    } else if (isPast && !hist) {
      cardClass += ' past';
      titleHtml = `<div class="week-workout-title">${sched.title}</div>`;
      tagHtml = `<span class="week-tag ${sched.type}">${sched.type === 'rest' ? 'recovery' : sched.type}</span>`;
    } else if (isToday) {
      cardClass += ' today';
      onclick = `onclick="showToday()"`;
      titleHtml = `<div class="week-workout-title">${sched.title}</div>`;
      const exList = sched.exercises ? sched.exercises.map(e => e.name).join(' · ') : sched.activities ? sched.activities.map(a => a.task).join(' · ') : '';
      detailHtml = `<div class="week-detail">${exList}</div>`;
      tagHtml = `<span class="week-tag ${sched.type}">${sched.type === 'rest' ? 'recovery' : sched.type}</span>`;
    } else {
      onclick = `onclick="showDay('${dayName}', '${key}')"`;
      titleHtml = `<div class="week-workout-title">${sched.title}</div>`;
      const exList = sched.exercises ? sched.exercises.map(e => e.name).join(' · ') : sched.activities ? sched.activities.map(a => a.task).join(' · ') : '';
      detailHtml = `<div class="week-detail">${exList}</div>`;
      tagHtml = `<span class="week-tag ${sched.type}">${sched.type === 'rest' ? 'recovery' : sched.type}</span>`;
    }

    html += `<div class="${cardClass}" ${onclick}>
      <div class="week-date-col">
        <div class="week-date-num">${dateNum}</div>
        <div class="week-date-month">${dateMonth}</div>
      </div>
      <div class="week-card-body">
        <div class="week-day-name">${dayLabel}${isToday ? ' — Today' : ''}</div>
        ${titleHtml}
        ${detailHtml}
        ${tagHtml}
      </div>
    </div>`;
  });

  html += `</div>`;
  return html;
}

function renderHistoryView(key) {
  const hist = HISTORY[key];
  const d = new Date(key);
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTH = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let html = `<div class="nav">
    <button class="nav-btn back" onclick="showWeek()">&#8592; Week</button>
    <button class="nav-btn" onclick="showToday()" style="margin-left:auto">Today</button>
  </div>
  <div class="history-card">
    <div class="history-date">${DAY_NAMES[d.getDay()]}, ${MONTH[d.getMonth()]} ${d.getDate()}</div>
    <div class="history-title">${hist.session_type}</div>
    <div class="history-summary">${hist.summary}</div>
    <div class="history-note">${hist.note}</div>
  </div>`;
  return html;
}

function renderDayView(dayName, dateLabel) {
  const dayData = DATA.schedule[dayName];
  const d = new Date(dateLabel);
  const MONTH = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAY_NAMES_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dateStr = `${DAY_NAMES_FULL[d.getDay()]}, ${MONTH[d.getMonth()]} ${d.getDate()}`;
  let html = `<div class="nav">
    <button class="nav-btn back" onclick="showWeek()">&#8592; Week</button>
    <button class="nav-btn" onclick="showToday()" style="margin-left:auto">Today</button>
  </div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:16px">${dateStr}</div>`;
  html += renderWorkout(dayName, dayData, false);
  return html;
}

let _todayDate = new Date();
let _todayName = '';

function showToday() {
  document.getElementById('app').innerHTML =
    `<div class="nav" style="justify-content:flex-end">
      <button class="nav-btn" onclick="showWeek()">Week</button>
    </div>` + renderWorkout(_todayName, DATA.schedule[_todayName]);
}

function showWeek() {
  document.getElementById('app').innerHTML = renderWeek(_todayDate);
  // Scroll today into view
  const todayCard = document.querySelector('.week-card.today');
  if (todayCard) todayCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function showDay(dayName, dateLabel) {
  document.getElementById('app').innerHTML = renderDayView(dayName, dateLabel);
}

function showHistory(key) {
  document.getElementById('app').innerHTML = renderHistoryView(key);
}

function init() {
  _todayDate = new Date();
  _todayDate.setHours(0,0,0,0);
  _todayName = DAYS[_todayDate.getDay()];
  showToday();
}

// Refresh time every minute
init();
setInterval(() => {
  const timeEl = document.querySelector('.time');
  if (timeEl) timeEl.textContent = formatTime(new Date());
}, 60000);
</script>
